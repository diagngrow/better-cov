name: "Better Coverage"
description: "Compute weighted coverage score based on function importance"
author: "Geoffrey Pruvost"
branding:
  icon: "check-circle"
  color: "green"

inputs:
  coverage-xml:
    description: "Path to coverage.xml file"
    required: false
    default: "coverage.xml"
  source-dirs:
    description: "Source directories to scan (space-separated)"
    required: false
    default: "src/"
  min-score:
    description: "Minimum score threshold (fails if below)"
    required: false
    default: ""
  output:
    description: "Output JSON file path"
    required: false
    default: "better_cov.json"
  pr-comment:
    description: "Post a Markdown coverage report as a PR comment (requires pull-requests: write permission)"
    required: false
    default: "false"
  top-n:
    description: "Number of top functions to include in the report (default: 10)"
    required: false
    default: "10"

runs:
  using: "composite"
  steps:
    - name: Install better-cov
      shell: bash
      run: pip install better-cov
    - name: Run better-cov
      shell: bash
      run: |
        ARGS="--coverage-xml ${{ inputs.coverage-xml }} --source-dirs ${{ inputs.source-dirs }} --output ${{ inputs.output }} --top-n ${{ inputs.top-n }}"
        if [ -n "${{ inputs.min-score }}" ]; then
          ARGS="$ARGS --min-score ${{ inputs.min-score }}"
        fi
        if [ "${{ inputs.pr-comment }}" = "true" ]; then
          ARGS="$ARGS --markdown-output better_cov_comment.md"
        fi
        better-cov $ARGS
    - name: Upload result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: better-cov-report
        path: ${{ inputs.output }}
    - name: Find existing coverage comment
      if: inputs.pr-comment == 'true' && github.event_name == 'pull_request'
      id: find-comment
      uses: peter-evans/find-comment@v3
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: github-actions[bot]
        body-includes: "<!-- better-cov-report -->"
    - name: Post PR comment
      if: inputs.pr-comment == 'true' && github.event_name == 'pull_request'
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: better_cov_comment.md
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        edit-mode: replace
